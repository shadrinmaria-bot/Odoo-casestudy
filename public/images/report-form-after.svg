<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="576" viewBox="0 0 1200 576" role="img" aria-labelledby="title desc">
  <title id="title">Redesigned safety incident report form</title>
  <desc id="desc">Two vector views of the improved Odoo safety incident report form inside an After comparison panel.</desc>
  <defs>
    <style>
      .ui{font-family:'Segoe UI',Arial,sans-serif;fill:#f5f5f6}.label{font-size:8px;font-weight:700}.value{font-size:7px;fill:#a3a4a8}.tiny{font-size:6px;fill:#a3a4a8}.line{stroke:#3c3e4a;stroke-width:1}.field{fill:#1b1d26;stroke:#3c3e4a}.card{fill:#3c3e4b;stroke:#5a5e6b}.icon{fill:none;stroke:#f5f5f6;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <symbol id="person" viewBox="0 0 20 20"><circle class="icon" cx="10" cy="5" r="3"/><path class="icon" d="M4 18c.5-4 2.5-6 6-6s5.5 2 6 6M10 8v4"/></symbol>
    <symbol id="fall" viewBox="0 0 20 20"><circle class="icon" cx="8" cy="4" r="2"/><path class="icon" d="m8 7 3 4 4 1M10 10l-4 4M11 11l1 6M3 18h14"/></symbol>
    <symbol id="alert" viewBox="0 0 20 20"><path class="icon" d="M10 2 18 17H2L10 2Z"/><path class="icon" d="M10 7v5M10 15h.01"/></symbol>
  </defs>

  <rect x=".5" y=".5" width="1199" height="575" rx="16" fill="#2fffd5" fill-opacity=".12" stroke="#2fffd5" stroke-opacity=".3"/>
  <rect x="17" y="18" width="68" height="24" rx="12" fill="#2fffd5"/>
  <text x="29" y="34" font-family="Arial,sans-serif" font-size="12" font-weight="600" letter-spacing="1.68" fill="#08130e">AFTER</text>

  <!-- Large form -->
  <g transform="translate(51 78)">
    <rect width="572" height="435" rx="16" fill="#2a2e3a" stroke="#5a5e6b"/>
    <rect width="572" height="48" rx="16" fill="#262a36"/><rect y="32" width="572" height="16" fill="#262a36"/>
    <text class="ui label" x="18" y="29" font-size="11">Safety Incident Report</text>
    <circle cx="544" cy="24" r="3" fill="#a3a4a8"/>
    <g transform="translate(18 64)">
      <text class="ui label" x="0" y="0">Reported By</text><circle cx="72" cy="-3" r="8" fill="#6b3e66"/><text class="ui value" x="86" y="0">Emma Granger</text>
      <text class="ui label" x="208" y="0">Incident Date</text><text class="ui value" x="275" y="0">Jul 11, 11:35 AM</text>
      <line class="line" x1="0" y1="18" x2="536" y2="18"/>
      <text class="ui label" x="0" y="39">Injured Worker</text><text class="ui value" x="82" y="39">Select Worker</text>
      <text class="ui label" x="208" y="39">Worker ID</text><text class="ui value" x="268" y="39">Select ID</text>
      <text class="ui label" x="414" y="39">Job Title</text><text class="ui value" x="470" y="39">Title</text>
      <text class="ui label" x="0" y="63">Incident Location</text><text class="ui value" x="92" y="63">Select Work Center</text>
      <text class="ui label" x="208" y="63">Work Center Location</text><text class="ui value" x="325" y="63">Warehouse 2</text>
      <text class="ui label" x="0" y="91" font-size="9">Type Of Injury</text>
    </g>
    <g transform="translate(18 174)">
      <g transform="translate(0 0)"><rect class="card" width="162" height="38" rx="3"/><use href="#person" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="17">Overexertion involving outside sources</text></g>
      <g transform="translate(187 0)"><rect class="card" width="162" height="38" rx="3"/><use href="#alert" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="17">Other exertions or bodily reactions</text></g>
      <g transform="translate(374 0)"><rect class="card" width="162" height="38" rx="3"/><use href="#alert" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="14">Repetitive motions involving</text><text class="ui tiny" x="37" y="24">microtasks</text></g>
      <g transform="translate(0 48)"><rect class="card" width="162" height="38" rx="3"/><use href="#fall" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="20">Falls on the same level</text></g>
      <g transform="translate(187 48)"><rect class="card" width="162" height="38" rx="3"/><use href="#fall" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="14">Roadway incidents by motorized</text><text class="ui tiny" x="37" y="24">vehicles</text></g>
      <g transform="translate(374 48)"><rect class="card" width="162" height="38" rx="3"/><use href="#person" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="14">Struck against object or</text><text class="ui tiny" x="37" y="24">equipment</text></g>
      <g transform="translate(0 96)"><rect class="card" width="162" height="38" rx="3"/><use href="#person" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="20">Struck by object or equipment</text></g>
      <g transform="translate(187 96)"><rect class="card" width="162" height="38" rx="3"/><use href="#fall" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="20">Slip or trip without fall</text></g>
      <g transform="translate(374 96)"><rect class="card" width="162" height="38" rx="3"/><use href="#alert" x="8" y="9" width="20" height="20"/><text class="ui tiny" x="37" y="14">Caught in equipment or</text><text class="ui tiny" x="37" y="24">objects</text></g>
    </g>
    <g transform="translate(18 333)"><text class="ui label" x="0" y="0">Incident Details</text><rect class="field" x="0" y="10" width="310" height="57" rx="3"/><text class="ui tiny" x="10" y="26">Describe what happened, conditions at the time, and any other relevant details...</text>
      <text class="ui label" x="346" y="0">Actions Taken</text><line class="line" x1="346" y1="18" x2="536" y2="18"/><text class="ui tiny" x="346" y="34">Time of incident</text><text class="ui value" x="440" y="34">Select time</text><text class="ui tiny" x="346" y="54">Incident Severity</text><circle cx="447" cy="51" r="4" fill="#f9464c"/><text class="ui tiny" x="457" y="54">Critical</text><circle cx="493" cy="51" r="4" fill="#008fe3"/><text class="ui tiny" x="503" y="54">Needs Attention</text></g>
    <rect x="18" y="409" width="83" height="18" rx="3" fill="#6b3e66"/><text class="ui tiny" x="32" y="421" fill="#fff">SUBMIT REPORT</text><rect x="108" y="409" width="48" height="18" rx="3" fill="#3c3e4b"/><text class="ui tiny" x="120" y="421">Discard</text>
  </g>

  <!-- Compact form with validation -->
  <g transform="translate(698 126)">
    <rect width="434" height="329" rx="16" fill="#2a2e3a" stroke="#5a5e6b"/>
    <rect width="434" height="38" rx="16" fill="#262a36"/><rect y="24" width="434" height="14" fill="#262a36"/>
    <text class="ui label" x="14" y="24" font-size="9">Safety Incident Report</text>
    <text class="ui label" x="14" y="61">Reported By</text><circle cx="72" cy="58" r="6" fill="#6b3e66"/><text class="ui value" x="82" y="61">Emma Granger</text>
    <text class="ui label" x="205" y="61">Incident Date</text><text class="ui value" x="270" y="61">Jun 4, 6:25 PM</text>
    <line class="line" x1="14" y1="76" x2="420" y2="76"/>
    <text x="14" y="96" font-family="Segoe UI,Arial" font-size="7" font-weight="700" fill="#fb5157">Injured Worker</text><line x1="14" y1="102" x2="130" y2="102" stroke="#fb5157"/>
    <text x="154" y="96" font-family="Segoe UI,Arial" font-size="7" font-weight="700" fill="#fb5157">Worker ID</text><line x1="154" y1="102" x2="270" y2="102" stroke="#fb5157"/>
    <text x="14" y="119" font-family="Segoe UI,Arial" font-size="7" font-weight="700" fill="#fb5157">Incident Location</text><line x1="14" y1="125" x2="130" y2="125" stroke="#fb5157"/>
    <text class="ui label" x="14" y="147">Type Of Injury</text>
    <g transform="translate(14 158) scale(.72)"><use href="#person" width="20" height="20"/><use href="#alert" x="138" width="20" height="20"/><use href="#fall" x="276" width="20" height="20"/><use href="#person" y="52" width="20" height="20"/><use href="#fall" x="138" y="52" width="20" height="20"/><use href="#alert" x="276" y="52" width="20" height="20"/></g>
    <line class="line" x1="14" y1="235" x2="420" y2="235"/>
    <text class="ui label" x="14" y="253">Incident Details</text><rect class="field" x="14" y="262" width="223" height="44" rx="3"/>
    <text x="260" y="253" font-family="Segoe UI,Arial" font-size="7" font-weight="700" fill="#fb5157">Actions Taken</text><line x1="260" y1="260" x2="420" y2="260" stroke="#fb5157"/><text class="ui tiny" x="260" y="274">Time of incident</text><text x="350" y="274" font-family="Segoe UI,Arial" font-size="6" fill="#fb5157">Required field</text>
    <rect x="14" y="310" width="67" height="14" rx="2" fill="#6b3e66"/><text class="ui tiny" x="23" y="320">SUBMIT REPORT</text><rect x="87" y="310" width="40" height="14" rx="2" fill="#3c3e4b"/><text class="ui tiny" x="97" y="320">Discard</text>
  </g>
</svg>
